name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Bundle size report
        run: |
          echo "### Bundle artefacts" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/ | awk '{print $9, $5}' | sed '1d' >> $GITHUB_STEP_SUMMARY || true

      - name: Audit dependencies (non-blocking)
        run: npm audit --production --audit-level=high || true

  agent-ready:
    name: Audit agent present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify senior-engineer-auditor agent file exists
        run: |
          if [ ! -f "../.claude/agents/senior-engineer-auditor.md" ] && [ ! -f ".claude/agents/senior-engineer-auditor.md" ]; then
            echo "ℹ Audit agent lives in the parent workspace folder, not the repo. This step is informational only."
          else
            echo "✔ Audit agent present."
          fi
